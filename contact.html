  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "BreadcrumbList",
    "itemListElement": [
      {
        "@type": "ListItem",
        "position": 1,
        "name": "Home",
        "item": "https://pixloholidays.com/"
      },
      {
        "@type": "ListItem",
        "position": 2,

        "item": "https://pixloholidays.com/contact.html"
      }
    ]

<link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png">
<meta name="msapplication-config" content="browserconfig.xml">

</head>
<body>
  <a href="#main-content" class="skip-link">Skip to main content</a>

  <div id="site-header"></div>

  <main id="main-content">
    <div class="page-header">
      <nav class="breadcrumb" aria-label="Breadcrumb">
        <a href="./">Home</a>
        <span>/</span>
        <span class="current">Contact</span>
      </nav>
      <div class="page-tag"><i class="fas fa-headset"></i> Contact Us</div>
      <h1>Let's Plan Your <span>Perfect Holiday</span></h1>
      <p>Reach out to us for a free custom itinerary and best price options.</p>
    </div>
    
    <div class="main-content">
      <div class="contact-grid">
        <!-- Left Column -->
        <div>
          <div class="contact-info-card">
            <h2>Get in Touch</h2>
            
            <div class="contact-item">
              <div class="icon"><i class="fab fa-whatsapp"></i></div>
              <div class="info">
                <div class="label">WhatsApp</div>
                <div class="value">+91-7021662074</div>
                <a href="https://wa.me/917021662074?text=Hi%20Pixlo%20Holidays%21%20I%20want%20to%20plan%20my%20holiday." target="_blank" rel="noopener noreferrer" class="link">Send Message</a>
              </div>
            </div>
            
            <div class="contact-item">
              <div class="icon"><i class="fas fa-envelope"></i></div>
              <div class="info">
                <div class="label">Email</div>
                <div class="value">pixloholidays@gmail.com</div>
              </div>
            </div>
            
            <div class="contact-item">
              <div class="icon"><i class="fas fa-clock"></i></div>
              <div class="info">
                <div class="label">Business Hours</div>
                <div class="value">Open 24/7</div>
              </div>
            </div>
          </div>
          
          <!-- Quick Inquiry Form -->
          <div class="contact-form-card">
            <h2>Quick Inquiry</h2>
            <form onsubmit="const name = document.getElementById('name').value; const phone = document.getElementById('phone').value; const msg = document.getElementById('message').value; const text = 'Hi Pixlo Holidays! I have an inquiry.%0A%0AName: ' + name + '%0APhone: ' + phone + '%0A%0A' + msg; window.open('https://wa.me/917021662074?text=' + encodeURIComponent(text), '_blank'); return false;">
              <div class="form-group">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" required />
              </div>
              <div class="form-group">
                <label for="phone">Phone</label>
                <input type="tel" id="phone" name="phone" required />
              </div>
              <div class="form-group">
                <label for="message">Message</label>
                <textarea id="message" name="message" rows="3" required placeholder="Tell us about your travel plans..."></textarea>
              </div>
              <button type="submit" class="btn-amber">
                <i class="fab fa-whatsapp"></i> Send via WhatsApp
              </button>
            </form>
          </div>
        </div>
        
        <!-- Right Column - Map -->
        <div class="map-card">
          <h2>Our Location</h2>
          <div class="map-container">
            <iframe 
              src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d227748.382562444!2d70.282205!3d22.303894!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3959051000000000%3A0x0!2sPixlo%20Holidays!5e0!3m2!1sen!2sin!4v1700000000000" 
              title="Pixlo Holidays Location"
              allowfullscreen="" 
              loading="lazy" 
              referrerpolicy="no-referrer-when-downgrade">
            </iframe>
          </div>
        </div>
      </div>
    </div>
  </main>

  <div id="site-footer"></div>

  <script src="js/components.js"></script>
</body>
</html>
